<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | The Library of Roosey</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header id="header">
        <a href="/" id="logo">
            <img alt="Site logo" class="logo" src="/images/logo.png" width="100" height="100" />
            <div>
                <div style="padding-left: 0.5em; font-size: 1.3em; line-height: 0.6em;">The</div>
                <div style="font-size: 2.6em; line-height: 0.8em;">Library of Roosey</div>
                <div style="padding-left: 0.5em; opacity: 60%;">@ roosey.net</div>
            </div>
        </a>
    </header>
    {% include common/nav.html %}
    <main>
        {{ content }}
    </main>
    {% include common/footer.html %}
</body>

</html>

<style>
    header#header {
        padding: 1em 0;
        background-image:
            linear-gradient(var(--color-border-accent), var(--color-border-accent)),
            url("/images/site-banner.png");
    }

    #logo {
        color: white;
        font-variant: small-caps;
        font-weight: 500;
    }
</style>
