<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | The Library of Roosey</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header id="header">
        <div id="logo">
            <a href="/">
                <img alt="Site logo" class="logo" src="/images/logo.png" width="100" height="100" />
            </a>
            <div>
                <h1>The Library of Roosey</h1>
            </div>
        </div>
    </header>
    <nav id="nav">
        <div id="links">
            <a href="/">Main</a>
            <a href="/projects">Projects</a>
            <a href="/about">About</a>
        </div>
    </nav>
    <main>
        {{ content }}
    </main>
    <footer id="footer">
        <div>
            Copyright © 2026 Chikorita Lover. All rights reserved.
        </div>
        <div>
            <a href="https://github.com/Chikorita-Lover/chikorita-lover.github.io" target="_blank">Source code</a>
        </div>
    </footer>
</body>

</html>

<style>
    a.button {
        padding: 0.5em;
        border: 1px solid var(--color-border);
    }

    a.button:hover {
        text-decoration: none;
        border-color: var(--color-accent);
    }

    footer#footer {
        font-size: small;
        text-align: center;
        width: 100%;
        border-top: 1px solid var(--color-border);
        padding: 0.5em 0;
    }

    div#links a {
        font-size: small;
        padding: 0.5em 1.5em;
        margin: 0 0.3em;
        border-left: 1px solid var(--color-border);
        border-right: 1px solid var(--color-border);
    }

    div#links {
        width: 100%;
        max-width: 1280px;
        margin: auto;
        display: flex;
    }

    nav#nav {
        border-bottom: 1px solid var(--color-border);
        width: 100%;
    }

    div#logo h1 {
        font-weight: 500;
        font-size: 2.6rem;
        line-height: 1.0;
    }

    div#logo {
        display: flex;
        place-items: center;
        margin: auto;
        width: 100%;
        max-width: 1280px;
    }

    header#header {
        border-bottom: 1px solid var(--color-border);
        padding: 1em 0;
        width: 100%;
    }
</style>
