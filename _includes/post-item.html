<html>
<div style="border-top: 1px solid var(--color-border);">
    <div style="margin: 1.3em 1em; margin-right: auto;">
        {% if include.post.tags.size > 0 %}
        {% include tag-list.html style="margin-bottom: 1em;" tags=include.post.tags %}
        {% endif %}
        <div>
            <a href="{{ include.post.url }}" style="margin-right: auto; font-size: larger; font-weight: 500;">
                {{ include.post.title }}
            </a>
        </div>
        <small style="color: gray; text-align: right;"><i>{{ include.post.date | date: "%B %d, %Y" }}</i></small>
        <div style="color: black;">
            <i><small>{{ include.post.excerpt }}</small></i>
        </div>
    </div>
</div>

</html>
