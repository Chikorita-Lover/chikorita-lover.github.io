{% assign project = site.data.projects[include.id] %}
<html>
<a href="/projects/{{ include.id }}" style="display: flex; margin: 0.5em;" class="button">
    <img src="/images/projects/{{ include.id }}.png" alt="{{ project.name }}" width=120
        style="height: 90px; padding-right: 0.8em;" />
    <div style="margin-right: auto;">
        <div style="font-size: larger; font-weight: 500;">
            {% include project-name.html project=project %}
        </div>
        <div>
            {% include project-tags.html project=project %}
        </div>
    </div>
    <small style="color: gray; text-align: right;"><i>{{ project.releaseDate | date: "%B %Y" }}</i></small>
</a>

</html>
